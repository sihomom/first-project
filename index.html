<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="용돈 관리">
<link rel="apple-touch-icon" href="icon.png">
<title>용돈 관리</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f0; min-height: 100vh; }
.app { max-width: 390px; margin: 0 auto; padding: 1rem; padding-bottom: 3rem; }
.header { text-align: center; padding: 1rem 0 0.5rem; }
.header h1 { font-size: 18px; font-weight: 500; color: #1a1a1a; }
.header .date { font-size: 13px; color: #888; margin-top: 4px; }
.balance-card { background: #fff; border-radius: 16px; padding: 1.5rem; text-align: center; margin: 1rem 0; border: 0.5px solid #e0e0e0; }
.balance-label { font-size: 13px; color: #888; margin-bottom: 8px; }
.balance-amount { font-size: 36px; font-weight: 500; color: #1a1a1a; }
.balance-amount.negative { color: #d84040; }
.balance-sub { font-size: 12px; color: #aaa; margin-top: 6px; }
.stats { margin-bottom: 1rem; }
.stat { background: #fff; border-radius: 10px; padding: 0.75rem 1rem; border: 0.5px solid #e0e0e0; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 16px; font-weight: 500; color: #1a1a1a; }
.tab-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
.tab { flex: 1; padding: 9px 8px; text-align: center; font-size: 13px; border-radius: 10px; cursor: pointer; border: 0.5px solid #e0e0e0; background: #fff; color: #888; }
.tab.active { background: #efefeb; color: #1a1a1a; font-weight: 500; border-color: #d0d0cc; }
.form-wrap { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 16px; padding: 1rem; margin-bottom: 1rem; }
.form-title { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 12px; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
.form-row input, .form-row select, .form-row textarea { width: 100%; font-size: 15px; padding: 8px 10px; border: 0.5px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; font-family: inherit; }
.form-row textarea { height: 60px; resize: none; }
.form-btns { display: flex; gap: 8px; }
.form-btns button { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
.btn-cancel { background: #f0f0ec; border: 0.5px solid #ddd; color: #888; }
.btn-save { background: #fff; border: 0.5px solid #bbb; color: #1a1a1a; }
.section-title { font-size: 14px; font-weight: 500; color: #888; margin: 1rem 0 0.5rem; }
.tx-list { display: flex; flex-direction: column; gap: 6px; }
.tx-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; cursor: pointer; }
.tx-item:active { background: #f5f5f0; }
.tx-left { display: flex; flex-direction: column; gap: 2px; }
.tx-cat { font-size: 12px; color: #aaa; }
.tx-memo { font-size: 14px; color: #1a1a1a; }
.tx-amount { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.empty { text-align: center; padding: 2rem; font-size: 14px; color: #bbb; }
.cat-list { display: flex; flex-direction: column; gap: 6px; }
.cat-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; }
.cat-name { font-size: 14px; color: #1a1a1a; }
.cat-amount { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.sheet-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 100; }
.sheet-overlay.show { display: block; }
.sheet { position: fixed; bottom: -100%; left: 0; right: 0; max-width: 390px; margin: 0 auto; background: #fff; border-radius: 20px 20px 0 0; padding: 1.5rem 1rem 2.5rem; z-index: 101; transition: bottom 0.3s ease; }
.sheet.show { bottom: 0; }
.sheet-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 1.2rem; }
.sheet-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 1rem; }
.sheet-info { font-size: 13px; color: #888; margin-bottom: 4px; }
.sheet-value { font-size: 16px; color: #1a1a1a; margin-bottom: 12px; }
.sheet-btns { display: flex; gap: 8px; margin-top: 1rem; }
.sheet-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; border: 0.5px solid #ddd; }
.btn-edit { background: #fff; color: #1a1a1a; }
.btn-delete { background: #fff; color: #d84040; border-color: #f0c0c0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>용돈 관리</h1>
    <div class="date" id="today-date"></div>
  </div>
  <div class="balance-card">
    <div class="balance-label">오늘의 예산</div>
    <div class="balance-amount" id="balance-display">₩0</div>
    <div class="balance-sub" id="balance-sub"></div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">오늘의 지출</div>
      <div class="stat-value" id="today-spent">₩0</div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" id="tab-add" onclick="switchTab('add')">지출 추가</div>
    <div class="tab" id="tab-category" onclick="switchTab('category')">카테고리별로 보기</div>
  </div>
  <div id="view-add">
    <div class="form-wrap">
      <div class="form-title" id="form-title">지출 추가</div>
      <div class="form-row">
        <label>금액 (원)</label>
        <input type="number" id="input-amount" placeholder="0" />
      </div>
      <div class="form-row">
        <label>카테고리</label>
        <select id="input-category">
          <option value="식비">식비</option>
          <option value="카페">카페</option>
          <option value="대중교통">대중교통</option>
          <option value="생필품">생필품</option>
          <option value="건강">건강</option>
          <option value="문화">문화</option>
          <option value="쇼핑">쇼핑</option>
          <option value="경조사">경조사</option>
          <option value="저축">저축</option>
          <option value="주식">주식</option>
        </select>
      </div>
      <div class="form-row">
        <label>메모 (선택)</label>
        <textarea id="input-memo" placeholder="내용을 입력하세요"></textarea>
      </div>
      <div class="form-btns">
        <button class="btn-cancel" onclick="clearForm()">초기화</button>
        <button class="btn-save" id="btn-save" onclick="saveExpense()">저장</button>
      </div>
    </div>
    <div class="section-title">오늘의 지출 내역 <span style="font-size:12px;color:#bbb;">탭하면 수정/삭제</span></div>
    <div class="tx-list" id="tx-list"></div>
  </div>
  <div id="view-category" style="display:none;">
    <div class="section-title">이번 달 카테고리별 지출</div>
    <div class="cat-list" id="cat-list"></div>
  </div>
</div>
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">지출 내역</div>
  <div class="sheet-info">카테고리</div>
  <div class="sheet-value" id="sheet-cat"></div>
  <div class="sheet-info">금액</div>
  <div class="sheet-value" id="sheet-amount"></div>
  <div class="sheet-info">메모</div>
  <div class="sheet-value" id="sheet-memo"></div>
  <div class="sheet-btns">
    <button class="btn-edit" onclick="startEdit()">수정</button>
    <button class="btn-delete" onclick="confirmDelete()">삭제</button>
  </div>
</div>
<script>
const MONTHLY=350000,DAILY=Math.round(MONTHLY/30),STORAGE_KEY='yongdon_data';
let editingId=null,selectedId=null;
function getToday(){return new Date().toISOString().split('T')[0];}
function getMonth(){return new Date().toISOString().substring(0,7);}
function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):{carry:0,lastDate:getToday(),expenses:[]};}catch(e){return{carry:0,lastDate:getToday(),expenses:[]};}}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){}}
function checkRollover(d){const t=getToday();if(d.lastDate!==t){const s=d.expenses.filter(e=>e.date===d.lastDate).reduce((a,e)=>a+e.amount,0);d.carry=DAILY+d.carry-s;d.lastDate=t;saveData(d);}return d;}
function fmt(n){return'₩'+Math.round(n).toLocaleString('ko-KR');}
function render(){let d=loadData();d=checkRollover(d);const t=getToday(),dt=new Date(),wd=['일','월','화','수','목','금','토'];document.getElementById('today-date').textContent=dt.getFullYear()+'년 '+(dt.getMonth()+1)+'월 '+dt.getDate()+'일 ('+wd[dt.getDay()]+')';const b=DAILY+d.carry,s=d.expenses.filter(e=>e.date===t).reduce((a,e)=>a+e.amount,0),bal=b-s;const be=document.getElementById('balance-display');be.textContent=fmt(bal);be.className='balance-amount'+(bal<0?' negative':'');const sp=[];if(d.carry>0)sp.push('어제 이월 '+fmt(d.carry));else if(d.carry<0)sp.push('어제 초과 '+fmt(Math.abs(d.carry)));sp.push('기본 예산 '+fmt(DAILY));document.getElementById('balance-sub').textContent=sp.join(' · ');document.getElementById('today-spent').textContent=fmt(s);const te=d.expenses.filter(e=>e.date===t).reverse(),l=document.getElementById('tx-list');l.innerHTML=te.length===0?'<div class="empty">오늘 지출 내역이 없어요</div>':te.map(e=>'<div class="tx-item" onclick="openSheet(\''+e.id+'\')"><div class="tx-left"><span class="tx-cat">'+e.category+'</span><span class="tx-memo">'+(e.memo||'—')+'</span></div><span class="tx-amount">'+fmt(e.amount)+'</span></div>').join('');const m=getMonth(),me=d.expenses.filter(e=>e.date.startsWith(m));const cats=['식비','카페','대중교통','생필품','건강','문화','쇼핑','경조사','저축','주식'],ct=cats.map(c=>({name:c,total:me.filter(e=>e.category===c).reduce((a,e)=>a+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total),cl=document.getElementById('cat-list');cl.innerHTML=ct.length===0?'<div class="empty">이번 달 지출 내역이 없어요</div>':ct.map(c=>'<div class="cat-item"><span class="cat-name">'+c.name+'</span><span class="cat-amount">'+fmt(c.total)+'</span></div>').join('');}
function openSheet(id){selectedId=id;const d=loadData();const e=d.expenses.find(e=>e.id===id);if(!e)return;document.getElementById('sheet-cat').textContent=e.category;document.getElementById('sheet-amount').textContent=fmt(e.amount);document.getElementById('sheet-memo').textContent=e.memo||'없음';document.getElementById('sheet-overlay').classList.add('show');document.getElementById('sheet').classList.add('show');}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('show');document.getElementById('sheet').classList.remove('show');selectedId=null;}
function startEdit(){const d=loadData();const e=d.expenses.find(e=>e.id===selectedId);if(!e)return;closeSheet();editingId=selectedId;document.getElementById('input-amount').value=e.amount;document.getElementById('input-category').value=e.category;document.getElementById('input-memo').value=e.memo||'';document.getElementById('form-title').textContent='지출 수정';document.getElementById('btn-save').textContent='수정 완료';switchTab('add');window.scrollTo({top:0,behavior:'smooth'});}
function confirmDelete(){if(confirm('이 내역을 삭제할까요?')){const d=loadData();d.expenses=d.expenses.filter(e=>e.id!==selectedId);saveData(d);closeSheet();render();}}
function clearForm(){document.getElementById('input-amount').value='';document.getElementById('input-memo').value='';document.getElementById('input-category').value='식비';document.getElementById('form-title').textContent='지출 추가';document.getElementById('btn-save').textContent='저장';editingId=null;}
function saveExpense(){const amount=parseInt(document.getElementById('input-amount').value);if(!amount||amount<=0){alert('금액을 입력해주세요.');return;}const category=document.getElementById('input-category').value;const memo=document.getElementById('input-memo').value.trim();const d=loadData();if(editingId){const idx=d.expenses.findIndex(e=>e.id===editingId);if(idx>-1){d.expenses[idx].amount=amount;d.expenses[idx].category=category;d.expenses[idx].memo=memo;}editingId=null;}else{d.expenses.push({id:Date.now().toString(),date:getToday(),amount,category,memo});}saveData(d);clearForm();render();}
function switchTab(t){document.getElementById('tab-add').className='tab'+(t==='add'?' active':'');document.getElementById('tab-category').className='tab'+(t==='category'?' active':'');document.getElementById('view-add').style.display=t==='add'?'block':'none';document.getElementById('view-category').style.display=t==='category'?'block':'none';}
render();
</script>
</body>
</html>
